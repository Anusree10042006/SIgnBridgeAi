<!DOCTYPE html>
<html>

<head>

    <title>SignBridge AI Dashboard</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        h1{
            text-align:center;
            color:#333;
            margin-top:25px;
        }

        .container{
            width:95%;
            margin:auto;
        }

        .cards{

            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-top:30px;

        }

        .card{

            background:white;
            padding:25px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 3px 10px rgba(0,0,0,.15);

        }

        .card h2{

            font-size:18px;
            color:#666;

        }

        .card h1{

            color:#007bff;

        }

        .buttons{

            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-top:40px;

        }

        a{

            text-decoration:none;

        }

        .btn{

            background:#007bff;
            color:white;
            padding:15px;
            border-radius:8px;
            text-align:center;
            font-size:18px;

        }

        .btn:hover{

            background:#0056b3;

        }

    </style>

</head>

<body>

<h1>SignBridge AI Dashboard</h1>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Users</h2>
<h1>{{total_users}}</h1>
</div>

<div class="card">
<h2>Recognition History</h2>
<h1>{{total_history}}</h1>
</div>

<div class="card">
<h2>AI Chat</h2>
<h1>Available</h1>
</div>

<div class="card">
<h2>Camera</h2>
<h1>Ready</h1>
</div>

</div>

<div class="buttons">

<a href="/camera">
<div class="btn">
📷 Camera
</div>
</a>

<a href="/history">
<div class="btn">
📝 History
</div>
</a>

<a href="/translate">
<div class="btn">
✋ Text to Sign
</div>
</a>

<a href="/chat">
<div class="btn">
🤖 AI Chat
</div>
</a>

<a href="/scan">
<div class="btn">
📷 OCR Scan
</div>
</a>

<a href="/pdf">
<div class="btn">
📄 PDF Reader
</div>
</a>

<a href="/link">
<div class="btn">
🌐 Website Reader
</div>
</a>

<a href="/learn">
<div class="btn">
📚 Learn Signs
</div>
</a>

</div>

</div>

</body>

</html>
