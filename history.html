<!DOCTYPE html>
<html>

<head>

    <title>Recognition History</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        table{

            width:100%;
            border-collapse:collapse;
            background:white;

        }

        th{

            background:#007bff;
            color:white;
            padding:12px;

        }

        td{

            padding:12px;
            border:1px solid #ddd;

        }

        h1{

            color:#333;

        }

    </style>

</head>

<body>

<h1>Recognition History</h1>

<table>

<tr>

<th>ID</th>

<th>Recognized Text</th>

<th>Date</th>

</tr>

{% for row in records %}

<tr>

<td>{{ row.id }}</td>

<td>{{ row.text }}</td>

<td>{{ row.date }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
