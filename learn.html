<!DOCTYPE html>
<html>

<head>

<title>Learn Sign Language</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<h1>📚 Learn Indian Sign Language</h1>

<h2>Alphabet</h2>

<div class="gallery">

{% for letter in letters %}

<div class="card">

<img
src="{{ url_for('static', filename='signs/' + letter + '.png') }}"
width="100">

<p>{{ letter }}</p>

</div>

{% endfor %}

</div>

<br>

<a href="/">
<button>⬅ Back Home</button>
</a>

</body>

</html>
