<!DOCTYPE html>
<html>

<head>

<title>Image OCR</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<h1>📷 Image to Text</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file"
name="image"
accept="image/*"
required>

<br><br>

<button type="submit">

Extract Text

</button>

</form>

{% if result %}

<h2>Extracted Text</h2>

<textarea rows="15" cols="80">

{{ result }}

</textarea>

{% endif %}

<br><br>

<a href="/">⬅ Back Home</a>

</body>

</html>
